<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#06090e">
<title>Logbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Google+Sans+Mono&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   TOKENS
══════════════════════════════════════════════ */
:root {
  --bg: #06090e;
  --s1:  rgba(255,255,255,.05);
  --s2:  rgba(255,255,255,.09);
  --bd:  rgba(255,255,255,.08);
  --bd2: rgba(255,255,255,.18);
  --text: #e8eaed;
  --dim:  rgba(232,234,237,.52);
  --faint:rgba(232,234,237,.26);
  --accent:#8ab4f8; --green:#81c995; --amber:#fdd663;
  --red:#f28b82; --ssc:#f6ae2d; --upsc:#81c995; --reset:#c58af9;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg)}
body{color:var(--text);font-family:'Google Sans',system-ui,sans-serif}

/* ══════════════════════════════════════════════
   CANVAS + VIDEO LAYERS
   z=0 nebula (fallback while video buffers)
   z=1 youtube iframe (fullscreen video bg)
   z=2 dark overlay (dims video)
   z=3 star particles
══════════════════════════════════════════════ */
#nebula,#stars{position:fixed;inset:0;pointer-events:none}
#nebula{z-index:0}
#stars{z-index:3}

/* ── YouTube fullscreen background ── */
#yt-wrap{
  position:fixed;inset:0;z-index:1;
  overflow:hidden;pointer-events:none;
}
#yt-wrap iframe{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  /* Cover entire viewport regardless of orientation */
  width:max(100vw, 177.78vh);
  height:max(56.25vw, 100vh);
  border:none;
  opacity:0;
  transition:opacity 1.8s ease;
}
#yt-wrap.loaded iframe{opacity:1}
#vid-overlay{
  position:fixed;inset:0;z-index:2;
  background:rgba(6,9,14,.62);
  pointer-events:none;
}

/* ══════════════════════════════════════════════
   TOP NAV — 3 separate floating pills
══════════════════════════════════════════════ */
#topNav{
  position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;gap:8px;padding:12px 16px;
  background:rgba(6,9,14,.84);
  backdrop-filter:blur(22px) saturate(1.5);
  border-bottom:1px solid rgba(255,255,255,.06);
  opacity:0;pointer-events:none;
  transition:opacity .38s ease;
}
#topNav.show{opacity:1;pointer-events:auto}
.tnb{
  flex:1;font-family:'Google Sans',sans-serif;font-size:12px;font-weight:500;
  padding:9px 10px;border-radius:100px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.05);color:var(--dim);
  cursor:pointer;transition:all .2s;letter-spacing:.3px;
}
.tnb.on{
  background:linear-gradient(135deg,rgba(66,133,244,.22),rgba(52,168,83,.16));
  border-color:rgba(138,180,248,.35);color:var(--accent);
  box-shadow:0 0 16px rgba(138,180,248,.1);
}
.tnb:active{transform:scale(.93)}

/* ══════════════════════════════════════════════
   VIEW ARCHITECTURE
══════════════════════════════════════════════ */
#view-cover{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 24px;text-align:center;
  transition:transform .65s cubic-bezier(.22,.68,0,1.1),opacity .45s ease;
}
#view-cover.away{transform:translateY(-80px);opacity:0;pointer-events:none}

#view-logbook{
  position:fixed;inset:0;z-index:10;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:70px 16px 48px;
  transform:translateY(100%);
  transition:transform .6s cubic-bezier(.22,.68,0,1.1);
}
#view-logbook.on{transform:translateY(0)}

#view-week{
  position:fixed;inset:0;z-index:20;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:70px 16px 48px;
  background:rgba(6,9,14,.96);
  transform:translateX(100%);
  transition:transform .45s cubic-bezier(.22,.68,0,1.1);
}
#view-week.on{transform:translateX(0)}

/* ══════════════════════════════════════════════
   COVER
══════════════════════════════════════════════ */
.c-orbit{
  position:absolute;border-radius:50%;
  border:1px solid rgba(138,180,248,.07);
  top:50%;left:50%;pointer-events:none;
  animation:ospin linear infinite;
  transform:translate(-50%,-50%);
}
.c-orbit.a{width:280px;height:280px;animation-duration:26s}
.c-orbit.b{width:460px;height:460px;animation-duration:44s;animation-direction:reverse;border-color:rgba(197,138,249,.05)}
.c-orbit.c{width:660px;height:660px;animation-duration:66s;border-color:rgba(129,201,149,.04)}
@keyframes ospin{to{transform:translate(-50%,-50%) rotate(360deg)}}

.c-eye{
  font-family:'Google Sans Mono',monospace;font-size:10px;
  letter-spacing:3px;text-transform:uppercase;color:var(--faint);
  margin-bottom:26px;opacity:0;animation:fup .5s .08s ease both;
}
.c-word{
  font-size:clamp(52px,13vw,88px);font-weight:500;letter-spacing:-2px;line-height:1;
  background:linear-gradient(135deg,#e8eaed 0%,#8ab4f8 52%,#81c995 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:16px;min-height:1.1em;
}
.cur{
  display:inline-block;width:3px;height:.76em;
  background:linear-gradient(to bottom,#8ab4f8,#81c995);
  margin-left:4px;vertical-align:middle;border-radius:2px;
  animation:blink .9s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.c-tag{font-size:13px;color:var(--dim);letter-spacing:.5px;margin-bottom:50px;opacity:0}
.c-tag.v{animation:fup .4s ease both}
.c-btn{
  font-family:'Google Sans',sans-serif;font-size:15px;font-weight:500;
  padding:15px 46px;border-radius:100px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#4285f4,#34a853);color:#fff;
  box-shadow:0 0 52px rgba(66,133,244,.38);
  transition:transform .18s,box-shadow .18s;opacity:0;
}
.c-btn.v{animation:fup .4s .1s ease both}
.c-btn:active{transform:scale(.95)}
.c-date{
  margin-top:44px;font-family:'Google Sans Mono',monospace;
  font-size:10px;color:var(--faint);letter-spacing:1.5px;opacity:0;
}
.c-date.v{animation:fup .4s .2s ease both}
@keyframes fup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ══════════════════════════════════════════════
   LOGBOOK INNER
══════════════════════════════════════════════ */
.wrap{max-width:600px;margin:0 auto}
.lb-date{
  font-family:'Google Sans Mono',monospace;font-size:10px;
  color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;
}
.day-nav{display:flex;gap:5px;margin-bottom:13px;overflow-x:auto;scrollbar-width:none}
.day-nav::-webkit-scrollbar{display:none}
.day-nav button{
  flex:1;min-width:36px;background:var(--s1);border:1px solid var(--bd);
  border-radius:10px;padding:8px 4px 6px;font-family:'Google Sans',sans-serif;
  font-size:11px;cursor:pointer;color:var(--dim);transition:all .18s;backdrop-filter:blur(8px);
}
.day-nav button.on{
  background:linear-gradient(135deg,rgba(66,133,244,.24),rgba(52,168,83,.17));
  border-color:rgba(138,180,248,.38);color:var(--accent);
}
.day-nav button .dot{
  display:block;width:4px;height:4px;border-radius:50%;
  margin:4px auto 0;background:transparent;transition:background .18s;
}
.day-nav button .dot.full{background:var(--green)}
.day-nav button .dot.part{background:var(--amber)}
.tag{
  display:inline-flex;align-items:center;font-size:10px;
  letter-spacing:1px;text-transform:uppercase;
  padding:4px 12px;border-radius:100px;margin-bottom:12px;font-weight:500;
}
.tag.ssc{background:rgba(246,174,45,.1);color:var(--ssc);border:1px solid rgba(246,174,45,.2)}
.tag.upsc{background:rgba(129,201,149,.1);color:var(--upsc);border:1px solid rgba(129,201,149,.2)}
.tag.reset{background:rgba(197,138,249,.1);color:var(--reset);border:1px solid rgba(197,138,249,.2)}

/* ══════════════════════════════════════════════
   BLOCK CARDS — compact list with skeleton
══════════════════════════════════════════════ */
.bcard{
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.075);
  border-radius:16px;margin-bottom:9px;
  display:flex;align-items:center;gap:14px;
  padding:15px 16px;cursor:pointer;
  backdrop-filter:blur(14px);
  /* stagger-in hidden state */
  opacity:0;transform:translateY(24px);
  transition:opacity .44s ease,transform .44s cubic-bezier(.22,.68,0,1.15),
    border-color .2s,box-shadow .2s;
}
.bcard.shown{opacity:1;transform:none}
.bcard:active{transform:scale(.98)!important;opacity:.82}
.bcard:hover{border-color:rgba(255,255,255,.14)}
.bcard.ci-card{border-left:3px solid rgba(129,201,149,.4)}
.bcard.cur-card{border-color:rgba(138,180,248,.3);box-shadow:0 0 20px rgba(138,180,248,.08)}
@keyframes cfx{
  0%{box-shadow:none}
  35%{box-shadow:0 0 32px rgba(129,201,149,.55);border-color:rgba(129,201,149,.6)}
  100%{box-shadow:none}
}
.done-flash{animation:cfx .75s ease both}
.card-body{flex:1;min-width:0}
.card-ttl{font-size:13.5px;font-weight:500;color:var(--text);margin-bottom:5px;min-height:17px;overflow:hidden}
/* skeleton shimmer while text hasn't loaded */
.skel-ttl{
  width:58%;height:14px;border-radius:6px;margin-bottom:7px;
  background:linear-gradient(90deg,rgba(255,255,255,.06) 0%,rgba(255,255,255,.12) 50%,rgba(255,255,255,.06) 100%);
  background-size:200% 100%;
  animation:shimmer 1.6s ease infinite;
}
.skel-time{
  width:35%;height:10px;border-radius:4px;
  background:linear-gradient(90deg,rgba(255,255,255,.04) 0%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 100%);
  background-size:200% 100%;
  animation:shimmer 1.6s ease .25s infinite;
}
@keyframes shimmer{
  0%{background-position:-200% 0}
  100%{background-position:200% 0}
}
/* word-reveal spans */
.tw{display:inline-block;opacity:0;transform:translateY(7px);animation:wrd .32s ease forwards}
@keyframes wrd{to{opacity:1;transform:none}}
.card-pips{display:flex;gap:3px;margin-bottom:4px}
.pip{width:5px;height:5px;border-radius:2px;background:var(--bd2);flex-shrink:0;transition:background .2s,box-shadow .2s}
.pip.dn{background:var(--green);box-shadow:0 0 4px rgba(129,201,149,.42)}
.card-time{font-family:'Google Sans Mono',monospace;font-size:10px;color:var(--faint);min-height:13px}
.card-chev{font-size:14px;color:var(--faint);flex-shrink:0;transition:transform .2s,opacity .35s ease}
.bcard:hover .card-chev{transform:translateX(3px)}

.honesty{font-size:11px;color:var(--faint);font-style:italic;text-align:center;margin:20px 0 8px}
.rst-lnk{display:block;text-align:center;font-size:11px;color:var(--faint);text-decoration:underline;cursor:pointer;margin-top:10px;transition:color .15s}
.rst-lnk:active{color:var(--red)}

/* ══════════════════════════════════════════════
   BLOCK MODAL — centred, not bottom-sheet
══════════════════════════════════════════════ */
#bmBd{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,0);pointer-events:none;
  transition:background .3s ease;
}
#bmBd.on{
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(9px);
  pointer-events:auto;
}
#bm{
  position:fixed;
  top:50%;left:12px;right:12px;        /* small width margin on each side */
  max-height:82vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
  background:rgba(9,15,24,.97);
  border:1px solid rgba(255,255,255,.13);
  border-radius:22px;
  z-index:101;
  /* hidden: scaled down + centred */
  transform:translateY(-50%) scale(.88);
  opacity:0;pointer-events:none;
  transition:transform .45s cubic-bezier(.22,.68,0,1.2),opacity .3s ease;
  padding-bottom:20px;
}
#bm.on{
  transform:translateY(-50%) scale(1);
  opacity:1;pointer-events:auto;
}

.bm-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.18);margin:12px auto 0}
.bm-hdr{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:14px 18px 10px;gap:12px;
}
.bm-ttl-wrap{flex:1;min-width:0}
#bmTtl{
  font-size:20px;font-weight:500;word-break:break-word;min-height:1.2em;
  background:linear-gradient(90deg,#e8eaed,#8ab4f8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
#bmTime{font-family:'Google Sans Mono',monospace;font-size:11px;color:var(--faint);margin-top:5px;opacity:0;transition:opacity .35s ease}
.bm-hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}

/* close button */

.bm-x{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  color:var(--faint);font-size:14px;cursor:pointer;display:flex;
  align-items:center;justify-content:center;transition:background .15s;font-family:inherit;
}
.bm-x:active{background:rgba(255,255,255,.16)}
#bmBody{padding:4px 18px 24px;border-top:1px solid rgba(255,255,255,.08)}

/* items in modal */
.bm-row{
  display:flex;align-items:flex-start;gap:12px;
  padding:11px 0;border-top:1px solid rgba(255,255,255,.07);
  font-size:14px;cursor:pointer;user-select:none;color:var(--text);
  transition:opacity .12s;
  opacity:0;transform:translateX(-10px);
}
.bm-row:first-child{border-top:none;padding-top:14px}
.bm-row:active{opacity:.55}
.bm-row.chkd{color:var(--faint);text-decoration:line-through}
.bm-row-txt{flex:1;line-height:1.55;min-height:1em}
.checkbox{
  width:18px;height:18px;border-radius:5px;
  border:1.5px solid rgba(255,255,255,.22);flex-shrink:0;
  margin-top:2px;position:relative;
  transition:background .15s,border-color .15s,box-shadow .15s;
}
.checkbox.ck{background:var(--green);border-color:var(--green);box-shadow:0 0 8px rgba(129,201,149,.42)}
.checkbox.ck::after{content:"✓";color:#06090e;font-size:11px;font-weight:700;position:absolute;top:-1px;left:3px}
.bm-ci-st{font-size:13px;color:var(--dim);padding:14px 0 8px;line-height:1.55;opacity:0;transition:opacity .4s}
.bm-ci-st.vis{opacity:1}
.bm-verified{color:var(--green);font-weight:500}
.bm-unverified{color:var(--amber)}
.bm-field{margin-top:14px;opacity:0;transform:translateY(8px);transition:opacity .35s ease,transform .35s ease}
.bm-field.vis{opacity:1;transform:none}
.bm-field label{display:block;font-size:10px;color:var(--faint);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.bm-field input,.bm-field textarea{
  width:100%;font-family:'Google Sans',sans-serif;font-size:13px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);
  border-radius:10px;padding:9px 12px;color:var(--text);outline:none;transition:border-color .15s;
}
.bm-field input:focus,.bm-field textarea:focus{border-color:rgba(138,180,248,.4)}
.bm-field textarea{min-height:64px;resize:vertical}
.sv-btn{
  font-family:'Google Sans',sans-serif;font-size:12px;font-weight:500;
  background:rgba(138,180,248,.1);color:var(--accent);
  border:1px solid rgba(138,180,248,.22);border-radius:100px;
  padding:7px 20px;margin-top:8px;cursor:pointer;transition:background .15s,transform .12s;
}
.sv-btn:active{background:rgba(138,180,248,.2);transform:scale(.97)}
.sv-btn:disabled{opacity:.4;pointer-events:none}
.sv-st{font-size:11px;color:var(--green);margin-left:8px}

/* ══════════════════════════════════════════════
   WEEK VIEW
══════════════════════════════════════════════ */
.wk-head{
  display:flex;justify-content:space-between;align-items:baseline;
  border-bottom:1px solid rgba(255,255,255,.09);padding-bottom:14px;margin-bottom:18px;
}
.wk-head h2{
  font-size:20px;font-weight:500;
  background:linear-gradient(90deg,#e8eaed,#c58af9);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.wk-head span{font-family:'Google Sans Mono',monospace;font-size:11px;color:var(--dim)}
.wk-card{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  border-radius:16px;padding:14px 16px;margin-bottom:8px;
  display:flex;align-items:center;gap:12px;cursor:pointer;
  backdrop-filter:blur(8px);transition:border-color .18s,transform .15s;
}
.wk-card:active{transform:scale(.98)}
.wk-card.today{border-color:rgba(138,180,248,.3)}
.wk-day{width:32px;font-size:12px;color:var(--dim)}
.wk-day.today{color:var(--accent);font-weight:500}
.bar-track{flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,.07);overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .5s cubic-bezier(.22,.68,0,1.2)}
.bar-pct{width:32px;text-align:right;font-family:'Google Sans Mono',monospace;font-size:11px;color:var(--dim)}
.ci-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.14);flex-shrink:0;transition:background .2s}
.ci-dot.in{background:var(--green);box-shadow:0 0 6px rgba(129,201,149,.5)}

/* ══════════════════════════════════════════════
   POPUP
══════════════════════════════════════════════ */
#pop{
  position:fixed;inset:0;z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:24px;
  background:rgba(0,0,0,.72);backdrop-filter:blur(16px) saturate(1.2);
  opacity:0;pointer-events:none;transition:opacity .22s;
}
#pop.on{opacity:1;pointer-events:auto}
#pop-card{
  background:rgba(10,17,28,.97);border:1px solid rgba(255,255,255,.14);
  border-radius:24px;padding:32px 24px 22px;
  max-width:330px;width:100%;text-align:center;
  transform:scale(.55) translateY(32px);opacity:0;
  transition:transform .42s cubic-bezier(.22,.68,0,1.45),opacity .22s;
  box-shadow:0 28px 80px rgba(0,0,0,.85);
}
#pop.on #pop-card{transform:scale(1) translateY(0);opacity:1}
#pop.off #pop-card{transform:scale(.88) translateY(10px);opacity:0;transition-duration:.2s;transition-timing-function:ease-in}
#pop-icon{font-size:40px;margin-bottom:14px}
#pop-title{font-size:17px;font-weight:500;color:var(--text);margin-bottom:8px}
#pop-msg{font-size:13px;color:var(--dim);line-height:1.65;margin-bottom:24px;white-space:pre-wrap}
#pop-acts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.pb{font-family:'Google Sans',sans-serif;font-size:13px;font-weight:500;border-radius:100px;padding:10px 28px;cursor:pointer;transition:transform .14s,opacity .14s}
.pb:active{transform:scale(.94);opacity:.8}
.pb-p{background:linear-gradient(135deg,#4285f4,#34a853);color:#fff;border:none}
.pb-s{background:rgba(255,255,255,.07);color:var(--dim);border:1px solid rgba(255,255,255,.18)}

/* ══════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════ */
#toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(18px);
  background:rgba(10,17,28,.96);border:1px solid rgba(255,255,255,.12);
  border-radius:100px;padding:10px 22px;font-size:12px;color:var(--text);
  z-index:900;max-width:calc(100vw - 48px);text-align:center;
  pointer-events:none;opacity:0;white-space:nowrap;
  transition:transform .32s cubic-bezier(.22,.68,0,1.4),opacity .25s;
  backdrop-filter:blur(12px);
}
#toast.on{transform:translateX(-50%) translateY(0);opacity:1}
#toast.te{border-color:rgba(242,139,130,.3);color:var(--red)}
#toast.ts{border-color:rgba(129,201,149,.3);color:var(--green)}
</style>
</head>
<body>

<!-- ══ NEBULA CANVAS — shows while video buffers ══ -->
<canvas id="nebula"></canvas>

<!-- ══ YOUTUBE FULLSCREEN BACKGROUND ══
     autoplay+mute required by all browsers
     playsinline=1 required for Android Chrome & iOS
     loop+playlist = seamless loop
-->
<div id="yt-wrap">
  <iframe
    id="yt-iframe"

/* ════════════════════════════════════════════
   NEBULA BACKGROUND CANVAS
   Animated deep-space nebula using oscillating radial gradients.
   Replaces YouTube (Error 153 = video owner disabled embedding).
════════════════════════════════════════════ */
(function () {
  const cv  = document.getElementById('nebula');
  const ctx = cv.getContext('2d');
  let W, H, t = 0;

  // Nebula cloud definitions: position (0–1), colour, opacity
  const CLOUDS = [
    { cx:0.18, cy:0.42, r:0.58, rgb:[60,28,105], a:0.24, speed:0.00028, phase:0.0 },
    { cx:0.80, cy:0.18, r:0.50, rgb:[22,58,110], a:0.19, speed:0.00022, phase:1.2 },
    { cx:0.54, cy:0.84, r:0.52, rgb:[14,82,62],  a:0.16, speed:0.00018, phase:2.4 },
    { cx:0.68, cy:0.55, r:0.38, rgb:[80,44,128], a:0.13, speed:0.00032, phase:3.6 },
    { cx:0.30, cy:0.75, r:0.42, rgb:[44,18,80],  a:0.10, speed:0.00020, phase:0.8 },
  ];

  function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; }

  function frame() {
    ctx.clearRect(0, 0, W, H);
    // Deep space base
    ctx.fillStyle = '#06090e';
    ctx.fillRect(0, 0, W, H);

    // Animated nebula clouds
    for (const cl of CLOUDS) {
      const ox = Math.sin(t * cl.speed + cl.phase) * 0.04 * W;
      const oy = Math.cos(t * cl.speed * 0.8 + cl.phase + 1) * 0.03 * H;
      const x  = cl.cx * W + ox,  y = cl.cy * H + oy,  r = cl.r * W;
      const g  = ctx.createRadialGradient(x, y, 0, x, y, r);
      const [rv, gv, bv] = cl.rgb;
      g.addColorStop(0,   `rgba(${rv},${gv},${bv},${cl.a})`);
      g.addColorStop(0.5, `rgba(${rv},${gv},${bv},${cl.a * 0.45})`);
      g.addColorStop(1,   'transparent');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }
    t++;
    requestAnimationFrame(frame);
  }

  window.addEventListener('resize', resize);
  resize(); frame();
})();

/* ════════════════════════════════════════════
   STAR PARTICLES
   Gentle drift + twinkle + connecting lines.
   NO mouse tracking (removed per request).
════════════════════════════════════════════ */
(function () {
  const cv  = document.getElementById('stars');
  const ctx = cv.getContext('2d');
  const mob = window.matchMedia('(max-width:768px)').matches;
  const N = mob ? 60 : 110, CONN = mob ? 68 : 96;
  let W, H, stars = [];

  function Star() {
    this.x = this.ox = Math.random() * W;
    this.y = this.oy = Math.random() * H;
    this.r = Math.random() * 1.3 + 0.22;
    this.a = Math.random() * 0.55 + 0.1;
    this.da = (Math.random() - 0.5) * 0.012;
  }
  Star.prototype.tick = function () {
    // Gentle home drift
    this.ox += (Math.random() - 0.5) * 0.045;
    this.oy += (Math.random() - 0.5) * 0.045;
    this.ox = Math.max(0, Math.min(W, this.ox));
    this.oy = Math.max(0, Math.min(H, this.oy));
    // Spring to home (no repulsion)
    this.x += (this.ox - this.x) * 0.035;
    this.y += (this.oy - this.y) * 0.035;
    // Twinkle
    this.a += this.da;
    if (this.a < 0.06 || this.a > 0.7) this.da *= -1;
  };

  function resize() {
    W = cv.width = innerWidth;
    H = cv.height = innerHeight;
    stars = Array.from({ length: N }, () => new Star());
  }

  function frame() {
    ctx.clearRect(0, 0, W, H);
    // Connecting lines
    for (let i = 0; i < N; i++) {
      for (let j = i + 1; j < N; j++) {
        const dx = stars[i].x - stars[j].x, dy = stars[i].y - stars[j].y;
        const d  = Math.sqrt(dx * dx + dy * dy);
        if (d < CONN) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(138,180,248,${((1 - d / CONN) * 0.16).toFixed(3)})`;
          ctx.lineWidth = 0.5;
          ctx.moveTo(stars[i].x, stars[i].y);
          ctx.lineTo(stars[j].x, stars[j].y);
          ctx.stroke();
        }
      }
    }
    // Dots
    for (const s of stars) {
      s.tick();
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(232,234,237,${s.a.toFixed(2)})`;
      ctx.fill();
    }
    requestAnimationFrame(frame);
  }

  window.addEventListener('resize', resize);
  resize(); frame();
})();

/* ════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════ */
function dKm(a,b,c,d){
  const R=6371,dl=(c-a)*Math.PI/180,dp=(d-b)*Math.PI/180;
  const x=Math.sin(dl/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dp/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function toK(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function getMon(d){ const x=new Date(d); x.setDate(d.getDate()+(d.getDay()===0?-6:1)-d.getDay()); return x; }
function wkDates(){ const m=getMon(new Date()); return Array.from({length:7},(_,i)=>{ const dt=new Date(m); dt.setDate(m.getDate()+i); return dt; }); }
function dtOf(d){ return DT[DN[d.getDay()]]; }
function sk(k){ return 'logbook:'+k; }
function empty(){ return { checks:{}, mockScore:'', errorNote:'' }; }
function nItems(t){ return SCH[t].blocks.reduce((a,b)=>a+b.items.length,0); }
function nDone(d){ return Object.values(d.checks||{}).filter(Boolean).length; }
function curBlk(blocks){ const m=new Date().getHours()*60+new Date().getMinutes(); return blocks.find(b=>m>=b.sh*60+b.sm&&m<b.eh*60+b.em)||null; }

/* ════════════════════════════════════════════
   STORAGE
════════════════════════════════════════════ */
const cache={}, pend={};
async function getDay(k){
  if(cache[k]) return cache[k];
  try{ const r=await window.storage.get(sk(k),false); cache[k]=r?JSON.parse(r.value):empty(); }
  catch(e){ cache[k]=empty(); }
  return cache[k];
}
function setDay(k,data){
  cache[k]=data;
  clearTimeout(pend[k]);
  pend[k]=setTimeout(async()=>{
    try{ await window.storage.set(sk(k),JSON.stringify(data),false); }
    catch(e){
      if((e&&e.message||'').includes('rate limit')) setTimeout(()=>setDay(k,data),1800);
      else toast('Sync failed — data is safe here, reload later.','e');
    }
  },400);
}

/* Main modal sequence — everything intentionally paced */
async function runModal(blk, dayData, vKey, sched) {
  _blkId = blk.id; _vKey = vKey; _sched = sched;
  bmTtl.textContent = ''; bmTime.textContent = '';
  bmTime.style.opacity = '0'; bmBody.innerHTML = '';
  openBM();

  // ── Wait for modal to spring into position ──
  await wait(420);
  if (!_typing || _blkId !== blk.id) return;

  // ── Phase 1: type title (character is in loading state) ──
  await typeIn(bmTtl, blk.title || '', 35);
  if (!_typing) return;

  // ── Phase 2: fade in time ──
  bmTime.textContent = blk.time || '';
  bmTime.style.opacity = '1';
  await wait(100);

  // ── Special: checkin block ──
  if (blk.id === '__checkin') { await runCIModal(dayData, vKey); return; }

  // ── Phase 3: items appear one by one, each sliding in + typing ──
  for (let i = 0; i < blk.items.length; i++) {
    if (!_typing || _blkId !== blk.id) return;
    await wait(70);

    const ik  = blk.id + '_' + i;
    const chk = !!(dayData.checks && dayData.checks[ik]);
    const row = document.createElement('div');
    row.className = 'bm-row' + (chk ? ' chkd' : '');
    const cb  = document.createElement('div'); cb.className = 'checkbox' + (chk ? ' ck' : '');
    const txt = document.createElement('div'); txt.className = 'bm-row-txt';
    row.appendChild(cb); row.appendChild(txt);
    bmBody.appendChild(row);

    // Slide row in (CSS transition override)
    row.offsetHeight;
    row.style.transition = 'opacity .3s ease, transform .32s ease';
    row.style.opacity = '1'; row.style.transform = 'none';

    // Type item text while Rive stays in loading state
    await typeIn(txt, blk.items[i], 18);
    if (!_typing) return;

    const idx = i;
    row.addEventListener('click', () => {
      const d = cache[vKey] || empty();
      d.checks = d.checks || {}; d.checks[ik] = !d.checks[ik];
      setDay(vKey, d);
      cb.classList.toggle('ck', !!d.checks[ik]);
      row.classList.toggle('chkd', !!d.checks[ik]);
      updatePip(blk.id, idx, !!d.checks[ik], blk.items.length, d, vKey);
    });
  }

  // ── Phase 4: special fields ──
  if (blk.id === 'mock'   && _typing) await addMock(dayData, vKey);
  if (blk.id === 'review' && _typing) await addReview(dayData, vKey);
}

async function runCIModal(dayData, vKey) {
  const ci  = dayData.checkin;
  const st  = document.createElement('div');
  st.className = 'bm-ci-st';
  if (ci) st.innerHTML = `Checked in at ${ci.time} — <span class="${ci.verified?'bm-verified':'bm-unverified'}">${ci.note}</span>`;
  else st.textContent = 'Not checked in yet today.';
  bmBody.appendChild(st);
  await wait(60); st.classList.add('vis');
  await wait(280); if (!_typing) return;

  const btn = document.createElement('button');
  btn.className = 'sv-btn'; btn.textContent = ci ? 'Check in again' : "I'm at the library";
  btn.style.cssText = 'opacity:0;transform:translateY(8px)';
  bmBody.appendChild(btn);
  await wait(50);
  btn.style.transition = 'opacity .35s ease, transform .35s ease';
  btn.style.opacity = '1'; btn.style.transform = 'none';

  btn.addEventListener('click', async () => {
    if (!navigator.geolocation) { await showPop({type:'gps',icon:'📡',title:'Not Supported',message:'Geolocation not supported.'}); return; }
    const prev = btn.textContent; btn.disabled = true; btn.textContent = 'Locating…';
    const ts = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    try {
      const pos = await new Promise((res,rej) => navigator.geolocation.getCurrentPosition(res,rej,{timeout:12000,enableHighAccuracy:true,maximumAge:0}));
      const d2  = dKm(pos.coords.latitude, pos.coords.longitude, LIB.lat, LIB.lng);
      if (d2 <= 0.15) {
        const d = cache[vKey] || empty();
        d.checkin = { time:ts, verified:true, note:'location verified ✓' };
        setDay(vKey, d); toast('Check-in recorded ✓','s'); closeBM(); renderLog();
      } else {
        btn.disabled = false; btn.textContent = prev;
        await showPop({type:'location',icon:'📍',title:'Too Far Away',message:`You're ${Math.round(d2*1000)} m from the library.\nCheck-in only works on-site.`});
      }
    } catch(e) {
      btn.disabled = false; btn.textContent = prev;
      if      (e.code===1) await showPop({type:'error',icon:'🔒',title:'Permission Denied',message:'Location blocked.\n\nTap the lock icon → Site settings → Location → Allow, then retry.'});
      else if (e.code===2) await showPop({type:'error',icon:'📡',title:'GPS Unavailable',message:'No GPS signal. Step outside and retry.'});
      else                 await showPop({type:'error',icon:'⏱',title:'Timed Out',message:'Location timed out. Try again in an open area.'});
    }
  });
}

async function addMock(dayData, vKey) {
  await wait(100); if (!_typing) return;
  const w = document.createElement('div'); w.className = 'bm-field';
  w.innerHTML = `<label>Mock / sectional score — just log it</label>
    <input type="text" id="mkIn" value="${(dayData.mockScore||'').replace(/"/g,'&quot;')}" placeholder="e.g. 42/50, or how it felt"/>
    <button class="sv-btn" id="svMk">Save</button><span class="sv-st" id="mkSt"></span>`;
  bmBody.appendChild(w); await wait(50); w.classList.add('vis');
  document.getElementById('svMk').onclick = () => {
    const d = cache[vKey]||empty(); d.mockScore = document.getElementById('mkIn').value; setDay(vKey,d);
    const s = document.getElementById('mkSt'); if(s){s.textContent='Saved ✓';setTimeout(()=>s.textContent='',2000);}
  };
}
async function addReview(dayData, vKey) {
  await wait(100); if (!_typing) return;
  const w = document.createElement('div'); w.className = 'bm-field';
  w.innerHTML = `<label>What went wrong, in your own words</label>
    <textarea id="rvIn" placeholder="e.g. ran out of time on English">${dayData.errorNote||''}</textarea>
    <button class="sv-btn" id="svRv">Save</button><span class="sv-st" id="rvSt"></span>`;
  bmBody.appendChild(w); await wait(50); w.classList.add('vis');
  document.getElementById('svRv').onclick = () => {
    const d = cache[vKey]||empty(); d.errorNote = document.getElementById('rvIn').value; setDay(vKey,d);
    const s = document.getElementById('rvSt'); if(s){s.textContent='Saved ✓';setTimeout(()=>s.textContent='',2000);}
  };
}

function updatePip(blockId, idx, isDone, total, dayData, vKey) {
  const card = document.getElementById('bc-'+blockId); if (!card) return;
  const pips = card.querySelectorAll('.pip');
  if (pips[idx]) pips[idx].classList.toggle('dn', isDone);
  const all = Array.from({length:total}).every((_,i)=>!!(dayData.checks&&dayData.checks[blockId+'_'+i]));
  if (all) { card.classList.add('done-flash'); setTimeout(()=>card.classList.remove('done-flash'),800); toast('Section complete ✓','s'); }
}

/* ════════════════════════════════════════════
   RENDER LOGBOOK
   Phased loading:
   ① Containers (card shells) appear one by one (skeleton shimmer inside)
   ② Text fills in 3 cards behind: card N's text types when card N+3 container appears
   ③ Remaining cards get text after last container lands
════════════════════════════════════════════ */
const CONTAINER_STEP = 210;  // ms between each container appearing
const TEXT_OFFSET    = 3;    // how many containers ahead before text starts

async function renderLog(jump) {
  /* ── DATA FETCH ── */
  const dates = wkDates(), now = new Date(), nowK = toK(now);
  if (jump) vDay = jump;
  if (!vDay) vDay = nowK;

  // Fetch all days in parallel (hides storage latency)
  await Promise.all(dates.map(dt => getDay(toK(dt))));

  const vDate  = dates.find(d => toK(d) === vDay) || now;
  const vKey   = toK(vDate);
  const type   = dtOf(vDate);
  const sched  = SCH[type];
  const dd     = cache[vKey] || empty();
  const isToday= vKey === nowK;
  _vKey = vKey; _sched = sched;

  /* ── TOPBAR DATE ── */
  document.getElementById('lbDate').textContent =
    vDate.toLocaleDateString([], { weekday:'short', month:'short', day:'numeric' });

  /* ── DAY NAV ── */
  const nav = document.getElementById('dayNav'); nav.innerHTML = '';
  dates.forEach(dt => {
    const k=toK(dt), d=cache[k]||empty(), t=dtOf(dt);
    const tot=nItems(t), chk=nDone(d);
    const dc = !tot||!chk ? '' : chk>=tot ? 'full' : 'part';
    const btn = document.createElement('button');
    btn.dataset.day = k; if(k===vKey) btn.classList.add('on');
    btn.innerHTML = `${DN[dt.getDay()]}<span class="dot ${dc}"></span>`;
    btn.addEventListener('click', () => { vDay=k; isFirst=true; renderLog(); });
    nav.appendChild(btn);
  });

  /* ── TAG ── */
  document.getElementById('dayTag').innerHTML = `<span class="tag ${type}">${sched.label}</span>`;

  /* ── BUILD ALL CARD SHELLS (empty, skeleton inside) ── */
  const cardsEl = document.getElementById('dayCards'); cardsEl.innerHTML = '';
  const cur      = isToday ? curBlk(sched.blocks) : null;

  const allDefs = [
    { id:'__checkin', title:'Library Check-in', time:'GPS · on-site only',
      items:['check-in'], isCI:true },
    ...sched.blocks.map(b => ({ ...b, isCI:false }))
  ];

  const containers = allDefs.map((blk, i) => {
    const isCi  = blk.isCI;
    const isCur = cur && cur.id === blk.id;
    const d2    = cache[vKey] || empty();

    // Pip HTML (pre-computed from cache)
    const pHtml = isCi
      ? `<div class="pip ${d2.checkin?'dn':''}"></div>`
      : blk.items.map((_,j)=>`<div class="pip ${!!(d2.checks&&d2.checks[blk.id+'_'+j])?'dn':''}"></div>`).join('');

    const card = document.createElement('div');
    card.id        = 'bc-' + blk.id;
    card.className = 'bcard' + (isCi?' ci-card':'') + (isCur?' cur-card':'');
    // Skeleton state: shimmer title + time, hidden pips + chevron
    card.innerHTML = `
      <div class="card-body">
        <div class="card-ttl skel-ttl" id="ct-${blk.id}"></div>
        <div class="card-pips" style="opacity:0">${pHtml}</div>
        <div class="card-time skel-time" id="ctime-${blk.id}"></div>
      </div>
      <div class="card-chev" style="opacity:0">›</div>`;
    card.addEventListener('click', () => {
      const d = cache[_vKey]||empty(); runModal(blk, d, _vKey, _sched);
    });
    cardsEl.appendChild(card);
    return { blk, card, i, textRevealed:false };
  });

  /* ── RESET LINK ── */
  const oldR = document.getElementById('rstDay');
  if (oldR) {
    const r = oldR.cloneNode(true); oldR.parentNode.replaceChild(r, oldR);
    r.addEventListener('click', async () => {
      const yes = await showPop({
        type:'confirm',icon:'🗑️',title:"Clear today's checks?",
        message:vDate.toLocaleDateString([],{weekday:'long'})+' — all checkboxes reset.',
        buttons:[{label:'Cancel',value:false,primary:false},{label:'Clear',value:true}]
      });
      if (yes) { setDay(vKey, empty()); renderLog(); }
    });
  }

  /* ── PHASE 1 + 2: stagger containers, fill text 3 cards behind ──
     For each container i:
       - at time START + i×CONTAINER_STEP → show shell
       - simultaneously, start revealing text for container (i − TEXT_OFFSET)
     After last container → reveal text for remaining cards
  */
  const START = isFirst ? 180 : 0;

  containers.forEach(({ card, blk, i }) => {
    setTimeout(() => {
      // Show the shell
      card.classList.add('shown');
      card.style.transition = `opacity .44s ease, transform .44s cubic-bezier(.22,.68,0,1.15)`;

      // Trigger text for the card that's TEXT_OFFSET behind
      const textIdx = i - TEXT_OFFSET;
      if (textIdx >= 0 && !containers[textIdx].textRevealed) {
        containers[textIdx].textRevealed = true;
        revealCardText(containers[textIdx]);   // runs independently (not awaited)
      }

      // Last container → flush any remaining cards without text
      if (i === containers.length - 1) {
        const remaining = containers.filter(c => !c.textRevealed);
        remaining.forEach((c, ri) => {
          c.textRevealed = true;
          setTimeout(() => revealCardText(c), ri * 170 + 80);
        });
      }
    }, START + i * CONTAINER_STEP);
  });

  if (isFirst) isFirst = false;
}

/* Reveal a single card's text — runs asynchronously, doesn't block others */
async function revealCardText({ blk, card }) {
  const titleEl = document.getElementById('ct-' + blk.id);
  const timeEl  = document.getElementById('ctime-' + blk.id);
  const pipsEl  = card.querySelector('.card-pips');
  const chevEl  = card.querySelector('.card-chev');
  if (!titleEl) return;

  titleEl.classList.remove('skel-ttl');
  titleEl.innerHTML = '';

  // Word-by-word title reveal (intentional, not rushed)
  const words = blk.title.split(' ');
  for (let i = 0; i < words.length; i++) {
    await wait(55 + i * 68);
    const sp = document.createElement('span');
    sp.className = 'tw'; sp.textContent = (i ? ' ' : '') + words[i];
    sp.style.animationDelay = '0ms';
    titleEl.appendChild(sp);
  }

  // Pips appear
  if (pipsEl) { pipsEl.style.transition='opacity .35s ease'; pipsEl.style.opacity='1'; }

  // Time types in
  if (timeEl && blk.time) {
    timeEl.classList.remove('skel-time');
    await wait(75);
    for (const ch of blk.time) {
      timeEl.textContent += ch;
      await wait(20);
    }
  }

  // Chevron fades in
  if (chevEl) { chevEl.style.transition='opacity .32s ease'; chevEl.style.opacity='1'; }
}

/* ════════════════════════════════════════════
   RENDER WEEK
════════════════════════════════════════════ */
async function renderWeek() {
  const dates = wkDates();
  await Promise.all(dates.map(dt => getDay(toK(dt))));
  const nowK = toK(new Date()), mon = dates[0], sun = dates[6];
  document.getElementById('wkRange').textContent =
    `${mon.toLocaleDateString([],{month:'short',day:'numeric'})} – ${sun.toLocaleDateString([],{month:'short',day:'numeric'})}`;
  const grid = document.getElementById('wkGrid'); grid.innerHTML = '';
  dates.forEach(dt => {
    const k=toK(dt), d=cache[k]||empty(), t=dtOf(dt);
    const tot=nItems(t), chk=nDone(d), pct=tot?Math.round(chk/tot*100):0;
    const isT = k===nowK;
    const card = document.createElement('div');
    card.className = 'wk-card' + (isT?' today':'');
    card.innerHTML = `<div class="wk-day${isT?' today':''}">${DN[dt.getDay()]}</div>
      <div class="bar-track"><div class="bar-fill" style="width:0%"></div></div>
      <div class="bar-pct">${pct}%</div>
      <div class="ci-dot${d.checkin&&d.checkin.verified?' in':''}"></div>`;
    card.addEventListener('click', () => { vDay=k; isFirst=true; leaveWeek(); renderLog(k); });
    grid.appendChild(card);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      card.querySelector('.bar-fill').style.width = pct + '%';
    }));
  });
}

/* ════════════════════════════════════════════
   COVER BOOT — full typewriter sequence
════════════════════════════════════════════ */
(async () => {
  document.getElementById('cDate').textContent =
    new Date().toLocaleDateString([], { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  await wait(330);

  // Type "Logbook"
  const wm  = document.getElementById('cWord');
  wm.innerHTML = '<span class="cur"></span>';
  const cur = wm.querySelector('.cur');
  for (const ch of 'Logbook') {
    const sp = document.createElement('span'); sp.textContent = ch;
    wm.insertBefore(sp, cur);
    await wait(58 + Math.random() * 26);
  }
  await wait(950);
  cur.style.transition = 'opacity .4s'; cur.style.opacity = '0';
  await wait(420); cur.remove();

  // Staggered phase-in for tag, button, date
  document.getElementById('cTag').classList.add('v');
  await wait(190);
  document.getElementById('openBtn').classList.add('v');
  await wait(110);
  document.getElementById('cDate').classList.add('v');
})();
